name: 初始化 GitHub Pages

on:
  workflow_dispatch:  # 允许手动触发

permissions:
  contents: write
  id-token: write
  pages: write  # 添加这行：允许部署到 GitHub Pages

jobs:
  deploy:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      id-token: write
      pages: write
    environment:  # 添加这行：指定部署环境
      name: github-pages  # 添加这行：允许部署到 GitHub Pages

    steps:
      - name: Checkout code
        uses: actions/checkout@v6
        with:
          fetch-depth: 0  # 获取完整历史

      - name: Setup GitHub Pages
        uses: actions/configure-pages@v5

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v4
        with:
          path: ./docs

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
